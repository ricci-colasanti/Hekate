<!DOCTYPE html>
<html>
<head>
    <title>Hekate - Interactive Data Stream</title>
</head>
<body>
    <h1>Hekate - Interactive Data Stream</h1>
    
    <p>Status: <span id="status">Disconnected</span></p>
    
    <button id="startBtn">Start</button>
    <button id="stopBtn" disabled>Stop</button>
    
    <br><br>
    
    <label>
        Multiplier: <span id="multiplierValue">1.00</span>
    </label>
    <br>
    <input type="range" id="multiplierSlider" 
           min="0" max="5" step="0.1" value="1.0">
    <br>
    <span>0</span> - <span>5</span>
    
    <br><br>
    <hr>
    
    <div id="dataDisplay">
        Waiting for data...
    </div>

    <script>
        // WebSocket connection
        let socket;
        let isConnected = false;
        let isRunning = false;
        let currentMultiplier = 1.0;

        // DOM elements
        const statusEl = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const slider = document.getElementById('multiplierSlider');
        const multiplierValue = document.getElementById('multiplierValue');
        const dataDisplay = document.getElementById('dataDisplay');

        // Connect to WebSocket
        function connect() {
            socket = new WebSocket('ws://localhost:8080/ws');

            socket.onopen = function() {
                isConnected = true;
                statusEl.textContent = 'Connected';
                console.log('Connected to server');
            };

            socket.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    
                    if (data.type) {
                        handleControlMessage(data);
                    } else {
                        displayData(data);
                    }
                } catch (e) {
                    console.error('Error parsing message:', e);
                }
            };

            socket.onclose = function() {
                isConnected = false;
                statusEl.textContent = 'Disconnected';
                startBtn.disabled = true;
                stopBtn.disabled = true;
                console.log('Disconnected from server');
                setTimeout(connect, 3000);
            };

            socket.onerror = function(error) {
                console.error('WebSocket error:', error);
            };
        }

        // Handle control messages from server
        function handleControlMessage(data) {
            console.log('Control message:', data);
            
            switch(data.type) {
                case 'state':
                    isRunning = data.running;
                    currentMultiplier = data.value || 1.0;
                    updateUI();
                    slider.value = currentMultiplier;
                    multiplierValue.textContent = currentMultiplier.toFixed(2);
                    break;
                    
                case 'stopped':
                    isRunning = false;
                    updateUI();
                    break;
                    
                case 'multiplier_updated':
                    currentMultiplier = data.value;
                    multiplierValue.textContent = currentMultiplier.toFixed(2);
                    slider.value = currentMultiplier;
                    break;
            }
        }

        // Display data from stream
        function displayData(data) {
            const time = new Date(data.timestamp * 1000).toLocaleTimeString();
            dataDisplay.innerHTML = `
                <div>Value: ${data.value.toFixed(2)}</div>
                <div>Time: ${time}</div>
                <div>Multiplier: ${data.multiplier.toFixed(2)}</div>
            `;
        }

        // Send message to server
        function sendMessage(message) {
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify(message));
            } else {
                console.error('Socket is not open');
            }
        }

        // Update UI based on state
        function updateUI() {
            if (isRunning) {
                statusEl.textContent = 'Running';
                startBtn.disabled = true;
                stopBtn.disabled = false;
                // Slider is ALWAYS enabled - removed the disabled line
            } else {
                statusEl.textContent = 'Stopped';
                startBtn.disabled = false;
                stopBtn.disabled = true;
                // Slider is ALWAYS enabled - removed the disabled line
            }
        }

        // Event listeners
        startBtn.addEventListener('click', function() {
            sendMessage({ type: 'start' });
            isRunning = true;
            updateUI();
        });

        stopBtn.addEventListener('click', function() {
            sendMessage({ type: 'stop' });
            isRunning = false;
            updateUI();
        });

        // Slider always works, even when running
        slider.addEventListener('input', function() {
            const value = parseFloat(this.value);
            multiplierValue.textContent = value.toFixed(2);
            currentMultiplier = value;
            
            // Send new multiplier to server immediately
            sendMessage({ 
                type: 'multiplier', 
                value: value 
            });
        });

        // Start connection
        connect();
    </script>
</body>
</html>
